<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="XAI取り込み">
<title>XAI取り込み</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px; padding: 24px;
    font-family: -apple-system, system-ui, sans-serif;
    background: #0d1117; color: #e6edf3;
  }
  h1 { font-size: 20px; margin: 0; font-weight: 700; }
  p.sub { margin: 0; color: #8b949e; font-size: 14px; text-align: center; }
  .card { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 16px; }
  textarea {
    width: 100%; min-height: 96px; padding: 14px; border-radius: 12px;
    border: 1px solid #30363d; background: #161b22; color: #e6edf3;
    font-size: 16px; resize: vertical;
  }
  textarea:focus { outline: none; border-color: #388bfd; }
  button {
    width: 100%; padding: 16px; border: none; border-radius: 12px;
    background: #238636; color: #fff; font-size: 17px; font-weight: 700;
    cursor: pointer; transition: background .15s, transform .05s;
  }
  button:active { transform: scale(.98); }
  button:disabled { background: #30363d; color: #8b949e; }
  .msg { min-height: 24px; text-align: center; font-size: 15px; font-weight: 600; }
  .ok { color: #3fb950; }
  .err { color: #f85149; }
</style>
</head>
<body>
  <div class="card">
    <h1>🎬 XAI 録画取り込み</h1>
    <p class="sub">Loomの共有リンクを貼って送信するだけ。<br>Macが自動で文字起こし＆ノウハウ抽出します。</p>
    <textarea id="url" placeholder="https://www.loom.com/share/…" autocomplete="off" autocapitalize="off" spellcheck="false"></textarea>
    <button id="send">送信</button>
    <div class="msg" id="msg"></div>
  </div>
<script>
  const TOPIC = "naru-xai-ingest-1f1cc874c1";
  const $ = id => document.getElementById(id);
  const btn = $("send"), box = $("url"), msg = $("msg");

  async function send() {
    const raw = box.value.trim();
    const m = raw.match(/loom\.com\/share\/[a-zA-Z0-9]+/);
    if (!m) { msg.className = "msg err"; msg.textContent = "Loomの共有リンクを貼ってね"; return; }
    btn.disabled = true; msg.className = "msg"; msg.textContent = "送信中…";
    try {
      const r = await fetch("https://ntfy.sh/" + TOPIC, {
        method: "POST",
        body: "https://www." + m[0],
        headers: { "Title": "Loom投函", "Tags": "movie_camera" }
      });
      if (!r.ok) throw new Error("HTTP " + r.status);
      msg.className = "msg ok"; msg.textContent = "✅ 送信完了！取り込み結果はiPhoneに通知が来ます";
      box.value = "";
    } catch (e) {
      msg.className = "msg err"; msg.textContent = "❌ 送信失敗: " + e.message;
    } finally {
      btn.disabled = false;
    }
  }
  btn.addEventListener("click", send);
</script>
</body>
</html>
